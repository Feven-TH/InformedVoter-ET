<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InformedVoter-ET</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app-shell sidebar-open" id="appShell">
      <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
        <div class="brand brand--sidebar">
          <h1 class="brand-wordmark"><span>InformedVoter</span><span class="brand-accent">.et</span></h1>
        </div>

        <div class="side-panel">
          <label class="search-label" for="globalSearch">Search</label>
          <div class="search-field">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="globalSearch" type="search" placeholder="Party, topic, stance..." autocomplete="off" />
          </div>
        </div>

        <nav class="nav-links" aria-label="Primary">
          <button class="nav-link active" data-view="topics" type="button">Policy Topics </button>
          <button class="nav-link" data-view="chat" type="button">Active Chat Assistant</button>
          <button class="nav-link" data-view="parties" type="button">Competing Parties</button>
        </nav>
      </aside>

      <div class="sidebar-resizer" id="sidebarResizer" aria-hidden="true"></div>

      <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="Close sidebar"></button>

      <main class="workspace">
        <header class="topbar">
          <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar">☰</button>
          <div class="topbar-context">
            <p class="eyebrow" id="viewEyebrow">Topic Comparison</p>
            <h2 id="viewTitle">Browse Evidence by Category</h2>
          </div>
          <div class="topbar-brand" id="topbarBrand" aria-label="InformedVoter.et">
            <span>InformedVoter</span><span class="brand-accent">.et</span>
          </div>
        </header>

        <section class="view active" id="topicsView">
          <div class="split-layout">
            <div class="list-column">
              <div class="section-heading">
                <h3>Categories</h3>
              </div>
              <div class="topic-list" id="topicList"></div>
            </div>
            <div class="detail-column">
              <div class="detail-toolbar">
                <div>
                  <p class="eyebrow">Selected Category</p>
                  <h3 id="selectedTopicTitle">Select a topic</h3>
                </div>
                <select id="subTopicFilter" aria-label="Filter by sub-topic">
                  <option value="">All sub-topics</option>
                </select>
              </div>
              <div class="cards-grid" id="topicCards"></div>
            </div>
          </div>
        </section>

        <section class="view" id="partiesView">
          <div class="split-layout">
            <div class="list-column">
              <div class="section-heading">
                <h3>Parties</h3>
              </div>
              <div class="party-list" id="partyList"></div>
            </div>
            <div class="detail-column">
              <div class="detail-toolbar">
                <div>
                  <p class="eyebrow">Selected Party</p>
                  <h3 id="selectedPartyTitle">Select a party</h3>
                </div>
              </div>
              <div class="party-profile" id="partyProfile"></div>
            </div>
          </div>
        </section>

        <section class="view" id="chatView">
          <div class="chat-layout">
            <div class="chat-log" id="chatLog">
              <div class="message assistant">
                <p>Ask about party positions, category comparisons, or evidence-backed stances.</p>
              </div>
            </div>
            <form class="chat-form" id="chatForm">
              <input id="chatInput" name="message" type="text" placeholder="Ask about land policy, federalism, healthcare..." autocomplete="off" />
              <button type="submit">Send</button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <template id="evidenceCardTemplate">
      <article class="evidence-card">
        <a class="thumb-link" target="_blank" rel="noreferrer">
          <img class="thumb" alt="" loading="lazy" />
        </a>
        <div class="card-body">
          <div class="card-meta">
            <span class="sub-topic"></span>
          </div>
          <h4></h4>
          <p></p>
          <div class="card-footer">
            <a class="video-link" target="_blank" rel="noreferrer">Open citation</a>
          </div>
        </div>
      </article>
    </template>

    <script src="/assets/app.js"></script>
  </body>
</html>
